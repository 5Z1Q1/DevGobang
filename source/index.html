<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevGobang</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100vh; overflow-x: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  body {
    background: radial-gradient(ellipse at top, #1f2a44 0%, #14182a 45%, #0a0e1a 100%);
    position: relative; color: #e8ecf3;
  }
  /* 棋盘网格背景 */
  .board-grid {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.18;
    background-image:
      linear-gradient(rgba(255,255,255,0.6) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.6) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
    -webkit-mask-image: radial-gradient(ellipse at center, #000 30%, transparent 75%);
  }
  /* 散落的棋子 */
  .pieces { position: absolute; inset: 0; pointer-events: none; }
  .piece {
    position: absolute; border-radius: 50%;
    box-shadow: 0 0 18px rgba(0,0,0,0.4);
    animation: drift 14s ease-in-out infinite;
  }
  .piece.black {
    background: radial-gradient(circle at 35% 30%, #4a5568 0%, #1a202c 45%, #050810 100%);
  }
  .piece.white {
    background: radial-gradient(circle at 35% 30%, #ffffff 0%, #e2e8f0 50%, #a0aec0 100%);
  }
  @keyframes drift {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(8px, -12px); }
  }
  /* 主容器 */
  .cover {
    position: relative; z-index: 5;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
  }
  /* 头像 */
  .avatar-wrap {
    position: relative; margin-bottom: 1.8rem;
    width: 150px; height: 150px;
  }
  .avatar-ring {
    position: absolute; inset: -8px; border-radius: 50%;
    background: conic-gradient(from 0deg, #e94560, #f9c74f, #5eead4, #a78bfa, #e94560);
    animation: spin 8s linear infinite;
    filter: blur(2px); opacity: 0.85;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar {
    position: relative; width: 100%; height: 100%;
    border-radius: 50%; overflow: hidden;
    background: #fff;
    border: 3px solid rgba(255,255,255,0.9);
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 60px rgba(233,69,96,0.25);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* 标题 */
  .brand {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 0.4rem;
  }
  .brand-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #4a5568, #050810);
    box-shadow: 0 0 10px rgba(0,0,0,0.6);
  }
  .title {
    font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-weight: 800; letter-spacing: 0.08em;
    background: linear-gradient(180deg, #ffffff 0%, #cbd5e0 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: clamp(0.85rem, 1.8vw, 1rem);
    color: #f9c74f; letter-spacing: 0.3em; text-transform: uppercase;
    margin-bottom: 1.6rem; font-weight: 500;
  }
  .subtitle {
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: rgba(232,236,243,0.7);
    min-height: 1.8em; margin-bottom: 2.8rem;
    font-weight: 300; letter-spacing: 0.04em; text-align: center;
  }
  .cursor {
    display: inline-block; width: 2px; height: 1em;
    background: #f9c74f; margin-left: 3px; vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  /* 入口 */
  .entries { display: flex; gap: 1.4rem; flex-wrap: wrap; justify-content: center; }
  .entry {
    position: relative; overflow: hidden;
    display: flex; align-items: center; gap: 0.9rem;
    padding: 1.1rem 1.8rem; min-width: 220px;
    border-radius: 14px; text-decoration: none; color: #e8ecf3;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
  }
  .entry::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
    transform: translateX(-120%); transition: transform 0.7s;
  }
  .entry:hover::before { transform: translateX(120%); }
  .entry:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 14px 40px rgba(0,0,0,0.4);
  }
  .entry.diary { background: rgba(233,69,96,0.12); border-color: rgba(233,69,96,0.3); }
  .entry.diary:hover { background: rgba(233,69,96,0.22); border-color: rgba(233,69,96,0.5); }
  .entry .icon { font-size: 1.5rem; line-height: 1; }
  .entry .text { display: flex; flex-direction: column; }
  .entry .label { font-size: 1.05rem; font-weight: 600; letter-spacing: 0.04em; }
  .entry .sub { font-size: 0.75rem; color: rgba(232,236,243,0.55); margin-top: 2px; }
  /* 页脚 */
  .footer-hint {
    position: absolute; bottom: 1.4rem; left: 0; right: 0;
    text-align: center; color: rgba(232,236,243,0.35);
    font-size: 0.78rem; letter-spacing: 0.18em; z-index: 5;
  }
  .footer-hint .sep { margin: 0 0.6em; color: rgba(249,199,79,0.4); }
  @media (max-width: 520px) {
    .entries { flex-direction: column; width: 100%; max-width: 320px; }
    .entry { width: 100%; justify-content: flex-start; }
  }
</style>
</head>
<body>
  <div class="board-grid"></div>
  <div class="pieces" id="pieces"></div>
  <div class="cover">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar"><img src="/img/favicon.jpg" alt="DevGobang"></div>
    </div>
    <div class="brand">
      <span class="brand-dot"></span>
      <h1 class="title">DevGobang</h1>
    </div>
    <div class="tagline">Code Black First</div>
    <p class="subtitle"><span id="typed"></span><span class="cursor"></span></p>
    <div class="entries">
      <a class="entry blog" href="/blog/">
        <span class="icon">📝</span>
        <span class="text">
          <span class="label">技术博客</span>
          <span class="sub">代码 · 算法 · 笔记</span>
        </span>
      </a>
      <a class="entry diary" href="/diary/">
        <span class="icon">🔒</span>
        <span class="text">
          <span class="label">我们的日记</span>
          <span class="sub">仅限我们两人</span>
        </span>
      </a>
    </div>
  </div>
  <div class="footer-hint">
    © DevGobang<span class="sep">·</span>五子棋<span class="sep">·</span>Every Sunrise Fills Joy
  </div>
  <script>
    // 散落棋子
    const box = document.getElementById('pieces');
    const cfg = [
      { x: 8, y: 15, s: 26, c: 'black', d: 0 },
      { x: 85, y: 18, s: 22, c: 'white', d: 2 },
      { x: 12, y: 78, s: 30, c: 'white', d: 4 },
      { x: 88, y: 72, s: 24, c: 'black', d: 1 },
      { x: 78, y: 88, s: 18, c: 'black', d: 3 },
      { x: 20, y: 45, s: 16, c: 'white', d: 5 },
      { x: 70, y: 40, s: 14, c: 'black', d: 2 }
    ];
    cfg.forEach(p => {
      const el = document.createElement('div');
      el.className = 'piece ' + p.c;
      el.style.left = p.x + '%';
      el.style.top = p.y + '%';
      el.style.width = el.style.height = p.s + 'px';
      el.style.animationDelay = '-' + p.d + 's';
      el.style.opacity = (0.4 + Math.random() * 0.3).toFixed(2);
      box.appendChild(el);
    });
    // 打字机
    const lines = [
      'Every Sunrise Fills Joy.',
      '记录代码 · 记录生活 · 记录我们',
      '黑子先行 · 五子连珠',
      '欢迎来到 DevGobang'
    ];
    const typed = document.getElementById('typed');
    let li = 0, ci = 0, deleting = false;
    function tick() {
      const cur = lines[li];
      if (!deleting) {
        typed.textContent = cur.slice(0, ++ci);
        if (ci === cur.length) { deleting = true; setTimeout(tick, 2000); return; }
      } else {
        typed.textContent = cur.slice(0, --ci);
        if (ci === 0) { deleting = false; li = (li + 1) % lines.length; }
      }
      setTimeout(tick, deleting ? 40 : 95);
    }
    tick();
  </script>
</body>
</html>
