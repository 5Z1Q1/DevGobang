<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五子棋的小窝</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    position: relative;
  }
  /* 星空背景 */
  .stars {
    position: absolute; inset: 0; overflow: hidden; pointer-events: none;
  }
  .star {
    position: absolute; background: #fff; border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.3); }
  }
  /* 流光圆 */
  .blob {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.5;
    animation: float 12s ease-in-out infinite;
  }
  .blob.b1 { width: 400px; height: 400px; background: #e94560; top: -100px; left: -100px; }
  .blob.b2 { width: 350px; height: 350px; background: #533483; bottom: -80px; right: -80px; animation-delay: -4s; }
  .blob.b3 { width: 300px; height: 300px; background: #00b4d8; top: 40%; right: 20%; animation-delay: -8s; }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, -30px) scale(1.1); }
    66% { transform: translate(-30px, 40px) scale(0.95); }
  }
  .cover {
    position: relative; z-index: 2;
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #fff; padding: 2rem;
  }
  .avatar {
    width: 130px; height: 130px; border-radius: 50%;
    overflow: hidden; margin-bottom: 1.8rem;
    box-shadow: 0 0 40px rgba(233, 69, 96, 0.5);
    border: 3px solid rgba(255,255,255,0.25);
    animation: pulse 4s ease-in-out infinite;
  }
  .avatar img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(233, 69, 96, 0.5); }
    50% { box-shadow: 0 0 60px rgba(233, 69, 96, 0.8); }
  }
  .title {
    font-size: clamp(2.2rem, 6vw, 4rem);
    font-weight: 700;
    letter-spacing: 0.15em;
    margin-bottom: 0.8rem;
    background: linear-gradient(90deg, #fff, #ffd6e0, #fff);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(255,255,255,0.2);
  }
  .subtitle {
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    color: rgba(255,255,255,0.75);
    min-height: 1.8em;
    margin-bottom: 3rem;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .subtitle .cursor {
    display: inline-block; width: 2px; height: 1em;
    background: #fff; margin-left: 2px; vertical-align: middle;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .entries {
    display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
  }
  .entry {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 200px; height: 130px;
    border-radius: 18px;
    text-decoration: none; color: #fff;
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    position: relative; overflow: hidden;
  }
  .entry::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
    transform: translateX(-100%); transition: transform 0.6s;
  }
  .entry:hover::before { transform: translateX(100%); }
  .entry:hover {
    transform: translateY(-6px);
    background: rgba(255,255,255,0.16);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }
  .entry .icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .entry .label { font-size: 1rem; font-weight: 500; letter-spacing: 0.05em; }
  .entry.diary { background: rgba(233, 69, 96, 0.15); border-color: rgba(233, 69, 96, 0.3); }
  .entry.diary:hover { background: rgba(233, 69, 96, 0.25); }
  .footer-hint {
    position: absolute; bottom: 1.5rem; left: 0; right: 0;
    text-align: center; color: rgba(255,255,255,0.4);
    font-size: 0.8rem; letter-spacing: 0.1em;
  }
  @media (max-width: 480px) {
    .entries { flex-direction: column; }
    .entry { width: 260px; }
  }
</style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="cover">
    <div class="avatar"><img src="/img/my-icon-trans.png" alt="五子棋"></div>
    <h1 class="title">五子棋的小窝</h1>
    <p class="subtitle"><span id="typed"></span><span class="cursor"></span></p>
    <div class="entries">
      <a class="entry blog" href="/blog/">
        <span class="icon">📝</span>
        <span class="label">技术博客</span>
      </a>
      <a class="entry diary" href="/diary/">
        <span class="icon">🔒</span>
        <span class="label">我们的日记</span>
      </a>
    </div>
  </div>
  <div class="footer-hint">© 五子棋 · Code Black First</div>
  <script>
    // 生成星空
    const starsBox = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 1;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--dur', (Math.random() * 3 + 2) + 's');
      s.style.animationDelay = Math.random() * 3 + 's';
      starsBox.appendChild(s);
    }
    // 打字机副标题
    const lines = [
      'Every Sunrise Fills Joy.',
      '记录代码 · 记录生活 · 记录我们',
      '欢迎来到我的小窝'
    ];
    const typed = document.getElementById('typed');
    let li = 0, ci = 0, deleting = false;
    function tick() {
      const cur = lines[li];
      if (!deleting) {
        typed.textContent = cur.slice(0, ++ci);
        if (ci === cur.length) { deleting = true; setTimeout(tick, 1800); return; }
      } else {
        typed.textContent = cur.slice(0, --ci);
        if (ci === 0) { deleting = false; li = (li + 1) % lines.length; }
      }
      setTimeout(tick, deleting ? 45 : 90);
    }
    tick();
  </script>
</body>
</html>
