<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevGobang</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; min-height: 100vh; overflow-x: hidden;
    font-family: "JetBrains Mono", "SFMono-Regular", Consolas, -apple-system, "PingFang SC", "Microsoft YaHei", monospace;
  }
  body {
    background:
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.10) 0%, transparent 45%),
      radial-gradient(ellipse at 80% 100%, rgba(255,0,153,0.08) 0%, transparent 45%),
      linear-gradient(180deg, #f5f7fb 0%, #eef1f7 100%);
    position: relative; color: #1a2238;
  }
  /* 棋盘网格 + 赛博网格 */
  .board-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(30,41,59,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,41,59,0.06) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse at center, #000 35%, transparent 78%);
    -webkit-mask-image: radial-gradient(ellipse at center, #000 35%, transparent 78%);
  }
  /* 扫描线 */
  .scanlines {
    position: absolute; inset: 0; pointer-events: none; opacity: 0.35;
    background: repeating-linear-gradient(
      to bottom, transparent 0, transparent 3px, rgba(0,229,255,0.025) 3px, rgba(0,229,255,0.025) 4px
    );
    mix-blend-mode: multiply;
  }
  /* 散落棋子 */
  .pieces { position: absolute; inset: 0; pointer-events: none; }
  .piece {
    position: absolute; border-radius: 50%;
    animation: drift 14s ease-in-out infinite;
  }
  .piece.black {
    background: radial-gradient(circle at 35% 30%, #475569 0%, #1e293b 50%, #0f172a 100%);
    box-shadow: 0 0 14px rgba(15,23,42,0.4), 0 0 22px rgba(0,229,255,0.3);
  }
  .piece.white {
    background: radial-gradient(circle at 35% 30%, #ffffff 0%, #e2e8f0 60%, #94a3b8 100%);
    box-shadow: 0 0 14px rgba(255,255,255,0.9), 0 0 22px rgba(255,0,153,0.3);
  }
  @keyframes drift {
    0%, 100% { transform: translate(0,0); }
    50% { transform: translate(8px, -12px); }
  }
  /* 主容器 */
  .cover {
    position: relative; z-index: 5;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
  }
  /* 顶部状态条 */
  .status-bar {
    position: absolute; top: 1.2rem; left: 1.5rem; right: 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.72rem; letter-spacing: 0.2em; color: #64748b;
    z-index: 6;
  }
  .status-bar .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #00e5ff; margin-right: 6px; vertical-align: middle;
    box-shadow: 0 0 8px #00e5ff;
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot { 50% { opacity: 0.4; } }
  .status-bar .right { color: #ec4899; }
  /* 头像 */
  .avatar-wrap {
    position: relative; margin-bottom: 1.8rem;
    width: 140px; height: 140px;
  }
  .avatar-ring {
    position: absolute; inset: -6px; border-radius: 50%;
    background: conic-gradient(from 0deg, #00e5ff, #ec4899, #f9c74f, #00e5ff);
    animation: spin 8s linear infinite;
    filter: blur(3px); opacity: 0.7;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .avatar {
    position: relative; width: 100%; height: 100%;
    border-radius: 50%; overflow: hidden;
    background: #fff;
    border: 3px solid #fff;
    box-shadow: 0 8px 32px rgba(30,41,59,0.18), 0 0 40px rgba(0,229,255,0.35);
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  /* 角标装饰 */
  .corner {
    position: absolute; width: 18px; height: 18px;
    border: 2px solid #00e5ff;
  }
  .corner.tl { top: -4px; left: -4px; border-right: none; border-bottom: none; }
  .corner.tr { top: -4px; right: -4px; border-left: none; border-bottom: none; }
  .corner.bl { bottom: -4px; left: -4px; border-right: none; border-top: none; }
  .corner.br { bottom: -4px; right: -4px; border-left: none; border-top: none; }
  /* 标题 */
  .brand {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 0.4rem;
  }
  .brand-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #475569, #0f172a);
    box-shadow: 0 0 10px rgba(0,229,255,0.6);
  }
  .title {
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    font-weight: 800; letter-spacing: 0.06em;
    background: linear-gradient(90deg, #0f172a 0%, #1e40af 50%, #0f172a 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
  }
  .title::after {
    content: 'DevGobang'; position: absolute; left: 2px; top: 0;
    color: #ec4899; opacity: 0.5; z-index: -1;
    -webkit-text-fill-color: #ec4899;
  }
  .tagline {
    font-size: clamp(0.78rem, 1.6vw, 0.92rem);
    color: #0891b2; letter-spacing: 0.35em; text-transform: uppercase;
    margin-bottom: 1.4rem; font-weight: 600;
  }
  .tagline .bracket { color: #cbd5e1; }
  .subtitle {
    font-size: clamp(0.95rem, 2vw, 1.1rem);
    color: #475569;
    min-height: 1.8em; margin-bottom: 2.6rem;
    font-weight: 400; letter-spacing: 0.04em; text-align: center;
  }
  .subtitle .prefix { color: #94a3b8; }
  .cursor {
    display: inline-block; width: 8px; height: 1.1em;
    background: #00e5ff; margin-left: 4px; vertical-align: middle;
    animation: blink 1s step-end infinite;
    box-shadow: 0 0 8px #00e5ff;
  }
  @keyframes blink { 50% { opacity: 0; } }
  /* 滑动提示 */
  .entries { display: flex; justify-content: center; }
  .scroll-hint {
    display: flex; flex-direction: column; align-items: center; gap: 0.6rem;
    text-decoration: none; color: #475569;
    padding: 0.8rem 1.4rem;
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 999px;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(8px);
    transition: all 0.3s cubic-bezier(0.2,0.8,0.2,1);
    animation: bob 2.4s ease-in-out infinite;
  }
  .scroll-hint:hover {
    color: #0891b2;
    border-color: #00e5ff;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 0 24px rgba(0,229,255,0.35);
    transform: scale(1.05);
  }
  .scroll-hint .hint-text {
    font-size: 0.92rem; letter-spacing: 0.15em; font-weight: 600;
  }
  .scroll-hint .hint-arrow {
    font-size: 1.4rem; line-height: 1; color: #00e5ff;
    text-shadow: 0 0 8px rgba(0,229,255,0.5);
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }
  /* 滑动触发的过渡遮罩 */
  .nav-fade {
    position: fixed; inset: 0; z-index: 9998; pointer-events: none;
    background: linear-gradient(180deg, transparent 0%, #f5f7fb 100%);
    opacity: 0; transition: opacity 0.4s ease;
  }
  .nav-fade.active { opacity: 1; }
  /* 页脚 */
  .footer-hint {
    position: absolute; bottom: 1.4rem; left: 0; right: 0;
    text-align: center; color: #64748b;
    font-size: 0.72rem; letter-spacing: 0.2em; z-index: 5;
  }
  .footer-hint .sep { margin: 0 0.6em; color: #cbd5e1; }
  .footer-hint .accent { color: #0891b2; }
  @media (max-width: 520px) {
    .status-bar { font-size: 0.62rem; }
    .scroll-hint .hint-text { font-size: 0.82rem; }
  }
</style>
</head>
<body>
  <div class="board-grid"></div>
  <div class="scanlines"></div>
  <div class="pieces" id="pieces"></div>
  <div class="nav-fade" id="nav-fade"></div>
  <div class="status-bar">
    <span><span class="dot"></span>SYS ONLINE · v2.0</span>
    <span class="right">// 5Z1Q1.TOP</span>
  </div>
  <div class="cover">
    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar"><img src="/img/favicon.jpg" alt="DevGobang"></div>
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
    </div>
    <div class="brand">
      <span class="brand-dot"></span>
      <h1 class="title">DevGobang</h1>
    </div>
    <div class="tagline"><span class="bracket">[</span> Code Black First <span class="bracket">]</span></div>
    <p class="subtitle"><span class="prefix">&gt;_</span> <span id="typed"></span><span class="cursor"></span></p>
    <div class="entries">
      <a class="scroll-hint" href="/blog/" aria-label="向下滑动进入博客">
        <span class="hint-text">向下滑动进入博客</span>
        <span class="hint-arrow">↓</span>
      </a>
    </div>
  </div>
  <div class="footer-hint">
    <span class="accent">&copy;</span> DevGobang<span class="sep">|</span>五子棋<span class="sep">|</span>Every Sunrise Fills Joy
  </div>
  <script>
    const box = document.getElementById('pieces');
    const cfg = [
      { x: 7, y: 14, s: 24, c: 'black', d: 0 },
      { x: 86, y: 16, s: 20, c: 'white', d: 2 },
      { x: 11, y: 80, s: 28, c: 'white', d: 4 },
      { x: 89, y: 74, s: 22, c: 'black', d: 1 },
      { x: 80, y: 90, s: 16, c: 'black', d: 3 },
      { x: 18, y: 44, s: 14, c: 'white', d: 5 },
      { x: 72, y: 38, s: 12, c: 'black', d: 2 }
    ];
    cfg.forEach(p => {
      const el = document.createElement('div');
      el.className = 'piece ' + p.c;
      el.style.left = p.x + '%';
      el.style.top = p.y + '%';
      el.style.width = el.style.height = p.s + 'px';
      el.style.animationDelay = '-' + p.d + 's';
      el.style.opacity = (0.5 + Math.random() * 0.3).toFixed(2);
      box.appendChild(el);
    });
    const lines = [
      'Every Sunrise Fills Joy.',
      '记录代码 · 记录生活 · 记录我们',
      '黑子先行 · 五子连珠',
      'welcome to devgobang.sh'
    ];
    const typed = document.getElementById('typed');
    let li = 0, ci = 0, deleting = false;
    function tick() {
      const cur = lines[li];
      if (!deleting) {
        typed.textContent = cur.slice(0, ++ci);
        if (ci === cur.length) { deleting = true; setTimeout(tick, 2000); return; }
      } else {
        typed.textContent = cur.slice(0, --ci);
        if (ci === 0) { deleting = false; li = (li + 1) % lines.length; }
      }
      setTimeout(tick, deleting ? 40 : 90);
    }
    tick();
    // 滑动/按键 → 进入博客
    const goBlog = (() => {
      let fired = false;
      return () => {
        if (fired) return;
        fired = true;
        document.getElementById('nav-fade').classList.add('active');
        setTimeout(() => { window.location.href = '/blog/'; }, 380);
      };
    })();
    let lock = false;
    window.addEventListener('wheel', e => {
      if (lock) return;
      if (e.deltaY > 8) { lock = true; goBlog(); }
    }, { passive: true });
    let touchStartY = 0;
    window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchmove', e => {
      if (lock) return;
      if (touchStartY - e.touches[0].clientY > 40) { lock = true; goBlog(); }
    }, { passive: true });
    window.addEventListener('keydown', e => {
      if (['ArrowDown','PageDown',' ','Enter'].includes(e.key)) { e.preventDefault(); goBlog(); }
    });
    document.querySelector('.scroll-hint').addEventListener('click', e => { e.preventDefault(); goBlog(); });
  </script>
</body>
</html>
